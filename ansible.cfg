[defaults]
# Load every source in inventory/ and merge them: the static example
# hosts.ini plus any dynamic-inventory config you drop in (cloud plugins,
# the constructed plugin, etc.). See inventory/constructed.yml.example.
inventory = ./inventory
roles_path = ./roles
host_key_checking = True
retry_files_enabled = False
# Directory inventory ignores .ini by default; keep it loadable. Skip docs
# and *.example template files so they aren't parsed as inventory.
inventory_ignore_extensions = ~, .orig, .bak, .cfg, .retry, .pyc, .pyo, .swp, .md, .example

[inventory]
enable_plugins = host_list, auto, yaml, ini, toml, constructed, script

[privilege_escalation]
become = True
become_method = sudo
