---
- name: Download iroh-relay release tarball
  ansible.builtin.get_url:
    url: "{{ iroh_relay_tarball_url }}"
    dest: "/tmp/{{ iroh_relay_release_basename }}.tar.gz"
    mode: "0644"
  register: _iroh_relay_download

- name: Create temporary extraction directory
  ansible.builtin.file:
    path: "/tmp/{{ iroh_relay_release_basename }}"
    state: directory
    mode: "0755"

- name: Extract iroh-relay release tarball
  ansible.builtin.unarchive:
    src: "{{ _iroh_relay_download.dest }}"
    dest: "/tmp/{{ iroh_relay_release_basename }}"
    remote_src: true

- name: Install iroh-relay binary
  ansible.builtin.copy:
    src: "/tmp/{{ iroh_relay_release_basename }}/iroh-relay"
    dest: "{{ iroh_relay_bin_dir }}/iroh-relay"
    mode: "0755"
    owner: root
    group: root
    remote_src: true
  notify: Restart iroh-relay

- name: Clean up temporary release files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/{{ iroh_relay_release_basename }}.tar.gz"
    - "/tmp/{{ iroh_relay_release_basename }}"
